apiVersion: apps/v1
kind: Deployment

metadata:
  name: cloud-native-app

spec:
  replicas: 4

  selector:
    matchLabels:
      app: cloud-native-app

  template:
    metadata:
      labels:
        app: cloud-native-app

    spec:
      containers:
      - name: cloud-native-app
        image: 395516497310.dkr.ecr.ap-south-1.amazonaws.com/cloud-native-project-app:v2

        ports:
        - containerPort: 80
